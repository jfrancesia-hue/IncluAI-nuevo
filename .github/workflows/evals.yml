name: IncluIA Evals

on:
  pull_request:
    branches: [main]
    paths:
      - "lib/prompts.ts"
      - "scripts/run-evals.ts"
      - "evals/**"
      - ".github/workflows/evals.yml"
  workflow_dispatch:
    inputs:
      limit:
        description: "Cantidad máxima de casos a correr (vacío = 60)"
        required: false
        default: ""
      model:
        description: "Modelo Claude bajo evaluación"
        required: false
        default: "claude-sonnet-4-6"

jobs:
  evals:
    name: Run IncluIA evals (60 casos)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      EVALS_MODEL: ${{ github.event.inputs.model || 'claude-sonnet-4-6' }}
      EVALS_JUDGE_MODEL: "claude-sonnet-4-6"
      EVALS_CONCURRENCY: "4"
      EVALS_THRESHOLD: "85"
      EVALS_LIMIT: ${{ github.event.inputs.limit || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts
        # --ignore-scripts evita el "prisma generate" del postinstall que no necesitamos acá
        # y que requiere DATABASE_URL para completar.

      - name: Verify ANTHROPIC_API_KEY secret is set
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY no está configurado como secret del repositorio."
            exit 1
          fi

      - name: Run evals
        id: run_evals
        run: npm run evals

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evals-results-${{ github.run_id }}
          path: evals/results/
          retention-days: 30

      - name: Post summary to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = 'evals/results';
            if (!fs.existsSync(dir)) return;
            const mdFiles = fs.readdirSync(dir)
              .filter(f => f.endsWith('.summary.md'))
              .sort()
              .reverse();
            if (mdFiles.length === 0) return;
            const body = fs.readFileSync(path.join(dir, mdFiles[0]), 'utf-8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
